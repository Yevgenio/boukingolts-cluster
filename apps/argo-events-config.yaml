apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events-config
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yevgenio/boukingolts-cluster
    targetRevision: HEAD
    path: manifests/argo-events
    helm:
      releaseName: argo-events-config
  destination:
    server: https://kubernetes.default.svc
    namespace: argo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
