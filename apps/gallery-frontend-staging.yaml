apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gallery-frontend-staging
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Yevgenio/boukingolts-cluster
    targetRevision: HEAD
    path: manifests/gallery-frontend-staging
    helm:
      releaseName: gallery-frontend-staging
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: gallery-frontend-staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
