# SEALED VALUE REQUIRED — run kubeseal against the boukingolts cluster.
# This secret gives the gallery-frontend pod pull access to registry.boukingolts.art.
#
# To generate:
#   kubectl create secret docker-registry registry-credentials -n gallery-frontend \
#     --docker-server=registry.boukingolts.art \
#     --docker-username=... \
#     --docker-password=... \
#     --dry-run=client -o yaml | kubeseal -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-credentials
  namespace: gallery-frontend
spec:
  encryptedData:
    .dockerconfigjson: REPLACE_ME
  template:
    metadata:
      name: registry-credentials
      namespace: gallery-frontend
    type: kubernetes.io/dockerconfigjson
