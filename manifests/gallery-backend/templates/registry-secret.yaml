# SEALED VALUE REQUIRED — run kubeseal against the boukingolts cluster.
#
# To generate:
#   kubectl create secret docker-registry registry-credentials -n gallery-backend \
#     --docker-server=registry.boukingolts.art \
#     --docker-username=... \
#     --docker-password=... \
#     --dry-run=client -o yaml | kubeseal -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-credentials
  namespace: gallery-backend
spec:
  encryptedData:
    .dockerconfigjson: REPLACE_ME
  template:
    metadata:
      name: registry-credentials
      namespace: gallery-backend
    type: kubernetes.io/dockerconfigjson
