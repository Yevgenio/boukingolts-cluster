{{- if .Values.registry.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: registry-credentials
  namespace: {{ .Release.Namespace }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ printf `{"auths":{"%s":{"username":"%s","password":"%s","auth":"%s"}}}` .Values.registry.url .Values.registry.username .Values.registry.token (printf "%s:%s" .Values.registry.username .Values.registry.token | b64enc) | b64enc }}
{{- end }}
