replicaCount: 2

image:
  repository: ghcr.io/yevgenio/gallery-backend
  # Updated automatically by GitHub Actions on each push to main
  tag: "b1bde5b"
  pullPolicy: Always

# Set enabled: true and fill credentials if the GHCR package is private.
registry:
  enabled: false
  url: "ghcr.io"
  username: ""
  token: ""

service:
  type: ClusterIP
  port: 5000

ingress:
  host: api.boukingolts.art

resources:
  requests:
    cpu: 10m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
