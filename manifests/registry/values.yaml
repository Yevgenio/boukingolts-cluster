image:
  repository: registry
  tag: "2"
  pullPolicy: IfNotPresent

service:
  port: 5000

ingress:
  host: registry.boukingolts.art

# OCI Object Storage S3-compatible config.
# Dedicated bucket for Docker image layers — fully separate from the "gallery"
# bucket that stores artwork images, so lifecycle rules and IAM credentials
# are independent.
storage:
  s3Region: "il-jerusalem-1"
  s3RegionEndpoint: "https://axftwemw5l5c.compat.objectstorage.il-jerusalem-1.oraclecloud.com"
  s3Bucket: "boukingolts-registry"
  s3RootDirectory: ""

resources:
  requests:
    cpu: 20m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi
