# SEALED VALUES REQUIRED — run kubeseal against the boukingolts cluster to generate these.
#
# Plaintext values needed:
#   S3_ACCESS_KEY_ID     — same OCI IAM key already used by gallery-backend
#   S3_SECRET_ACCESS_KEY — same OCI IAM key already used by gallery-backend
#   REGISTRY_HTTP_SECRET — any random string (e.g. `openssl rand -hex 32`)
#   htpasswd             — bcrypt line for the push user:
#                          `htpasswd -nbB <user> <password>`
#
# To seal:
#   kubectl create secret generic registry-secret -n registry \
#     --from-literal=S3_ACCESS_KEY_ID=... \
#     --from-literal=S3_SECRET_ACCESS_KEY=... \
#     --from-literal=REGISTRY_HTTP_SECRET=... \
#     --from-literal=htpasswd='...' \
#     --dry-run=client -o yaml | kubeseal -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-secret
  namespace: registry
spec:
  encryptedData:
    REGISTRY_HTTP_SECRET: REPLACE_ME
    S3_ACCESS_KEY_ID: REPLACE_ME
    S3_SECRET_ACCESS_KEY: REPLACE_ME
    htpasswd: REPLACE_ME
  template:
    metadata:
      name: registry-secret
      namespace: registry
