# SEALED VALUES REQUIRED — run kubeseal against the boukingolts cluster to generate these.
#
# argo-secrets keys:
#   GITOPS_TOKEN   — GitHub PAT with repo write access to boukingolts-cluster
#   WEBHOOK_SECRET — random string set in GitHub webhook settings on both repos
#
# registry-push-creds keys:
#   .dockerconfigjson — docker login config for registry.boukingolts.art
#                       (the user/password you set in registry htpasswd)
#
# To generate:
#   # argo-secrets
#   kubectl create secret generic argo-secrets -n argo \
#     --from-literal=GITOPS_TOKEN=... \
#     --from-literal=WEBHOOK_SECRET=... \
#     --dry-run=client -o yaml | kubeseal -o yaml
#
#   # registry-push-creds
#   kubectl create secret docker-registry registry-push-creds -n argo \
#     --docker-server=registry.boukingolts.art \
#     --docker-username=... \
#     --docker-password=... \
#     --dry-run=client -o yaml | kubeseal -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: argo-secrets
  namespace: argo
spec:
  encryptedData:
    GITOPS_TOKEN: REPLACE_ME
    WEBHOOK_SECRET: REPLACE_ME
  template:
    metadata:
      name: argo-secrets
      namespace: argo
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: registry-push-creds
  namespace: argo
spec:
  encryptedData:
    .dockerconfigjson: REPLACE_ME
  template:
    metadata:
      name: registry-push-creds
      namespace: argo
    type: kubernetes.io/dockerconfigjson
