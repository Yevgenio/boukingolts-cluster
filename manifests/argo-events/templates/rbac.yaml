# The Sensor submits Workflows to the argo namespace. It needs its own
# ServiceAccount with a Role granting just that permission — principle of
# least privilege, scoped to this namespace only.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argo-events-workflow-trigger
  namespace: argo

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argo-events-workflow-trigger
  namespace: argo
rules:
  - apiGroups: [argoproj.io]
    resources: [workflows, workflowtemplates]
    verbs: [create, get, list, watch, update, patch]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argo-events-workflow-trigger
  namespace: argo
subjects:
  - kind: ServiceAccount
    name: argo-events-workflow-trigger
    namespace: argo
roleRef:
  kind: Role
  name: argo-events-workflow-trigger
  apiGroup: rbac.authorization.k8s.io
